spring.application.name=scheduler

# H2 Configuration for Local Run (default, without PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:ai_scheduler;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true

# For PostgreSQL, override via environment variables:
# SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/ai_scheduler
# SPRING_DATASOURCE_USERNAME=admin
# SPRING_DATASOURCE_PASSWORD=admin123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.jwt.secret=XbT7sYXUYHidZDAwbX2/7T+VFXx87SikXO07J9MeOnVOtinymyWMrQhVF+iy/egKGluxRagdaQ5kNUUY0jEeTw==
app.jwt.expiration-minutes=20160
app.base-url=${BASE_URL:http://localhost:8085}

openai.api.key=${OPENAI_API_KEY:}

google.oauth.client-id=${GOOGLE_CLIENT_ID:}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET:}
google.oauth.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8085/auth/google/calendar/callback}

server.port=${PORT:8085}